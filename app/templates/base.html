<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Tarifas ANEEL — Midwest Energias{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/colors-and-type.css">
  <link rel="stylesheet" href="/static/components.css">
  <style>
    body {
      background: var(--bg-subtle);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .mw-page {
      flex: 1;
      max-width: var(--container-lg);
      width: 100%;
      margin: 0 auto;
      padding: var(--space-8) var(--space-6) var(--space-12);
    }

    .mw-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      margin-bottom: var(--space-8);
      padding-bottom: var(--space-6);
      border-bottom: 1px solid var(--border);
    }

    .mw-topbar__brand {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      text-decoration: none;
    }

    .mw-topbar__brand img {
      height: 36px;
    }

    .mw-topbar__title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: var(--text-base);
      color: var(--fg-muted);
      padding-left: var(--space-3);
      border-left: 1px solid var(--border-strong);
    }

    .mw-topbar__nav a {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: var(--text-sm);
      color: var(--fg-muted);
      transition: color var(--dur-fast);
    }
    .mw-topbar__nav a:hover { color: var(--fg-brand); }

    .mw-footer {
      margin-top: auto;
      background: var(--mw-dark);
      color: var(--mw-ink-300);
      padding: var(--space-8) var(--space-6);
    }

    .mw-footer__inner {
      max-width: var(--container-lg);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      align-items: center;
      text-align: center;
      font-family: var(--font-body);
      font-size: var(--text-sm);
    }

    .mw-footer__brand {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    .mw-footer__brand img { height: 28px; }
    .mw-footer__brand span {
      font-family: var(--font-display);
      font-weight: 600;
      color: #fff;
    }

    .mw-footer__credit {
      color: var(--mw-ink-400);
      font-size: var(--text-xs);
    }
    .mw-footer__credit a {
      color: var(--mw-orange-300);
      text-decoration: none;
      font-weight: 600;
      transition: color var(--dur-fast);
    }
    .mw-footer__credit a:hover {
      color: var(--mw-orange-500);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .mw-footer__source {
      color: var(--mw-ink-500);
      font-size: var(--text-xs);
    }
    .mw-footer__source a {
      color: var(--mw-ink-300);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    @media (max-width: 640px) {
      .mw-topbar { flex-direction: column; align-items: flex-start; gap: var(--space-3); }
      .mw-topbar__title { border-left: 0; padding-left: 0; }
    }

    /* ---------- Botão flutuante "café pro Zé" ---------- */
    .mw-coffee {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 100;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 22px;
      background: var(--mw-gradient);
      color: #fff;
      border-radius: 999px;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 14px;
      text-decoration: none;
      box-shadow: var(--shadow-glow-orange);
      transition: transform 200ms var(--ease-out), box-shadow 200ms var(--ease-out), filter 200ms;
      animation: mw-coffee-pulse 3s var(--ease-in-out) infinite;
    }
    .mw-coffee:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 14px 32px rgba(241, 138, 38, 0.42);
      filter: brightness(1.05);
      animation-play-state: paused;
    }
    .mw-coffee:active { transform: translateY(-1px) scale(1.01); }
    .mw-coffee:focus-visible {
      outline: 2px solid #fff;
      outline-offset: 3px;
    }
    .mw-coffee svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }
    @keyframes mw-coffee-pulse {
      0%, 100% { box-shadow: 0 8px 24px rgba(241, 138, 38, 0.28); }
      50% { box-shadow: 0 12px 30px rgba(229, 54, 21, 0.45); }
    }
    @media (max-width: 540px) {
      .mw-coffee {
        bottom: 16px;
        right: 16px;
        padding: 12px 18px;
        font-size: 13px;
      }
    }
    @media (prefers-reduced-motion: reduce) {
      .mw-coffee { animation: none; }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="mw-typography">
  <div class="mw-page">
    <header class="mw-topbar">
      <a class="mw-topbar__brand" href="/">
        <img src="/static/logo.svg" alt="Midwest Energias" />
        <span class="mw-topbar__title">Tarifas ANEEL</span>
      </a>
      <nav class="mw-topbar__nav">
        <a href="/">Nova consulta</a>
      </nav>
    </header>

    {% block content %}{% endblock %}
  </div>

  <footer class="mw-footer">
    <div class="mw-footer__inner">
      <div class="mw-footer__brand">
        <img src="/static/logo-mark-white.svg" alt="Midwest" />
        <span>Midwest Energias</span>
      </div>
      <p class="mw-footer__source">
        Dados: <a href="https://dadosabertos.aneel.gov.br" target="_blank" rel="noopener">ANEEL Dados Abertos</a>
      </p>
      <p class="mw-footer__credit">
        Criado por
        <a href="https://instagram.com/pauloseze" target="_blank" rel="noopener">@pauloseze</a>
      </p>
    </div>
  </footer>

  <a class="mw-coffee"
     href="https://pay.cakto.com.br/3ex3dyi_864652"
     target="_blank"
     rel="noopener"
     aria-label="Me paga um café aí, Zé?">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M17 8h1a4 4 0 1 1 0 8h-1"/>
      <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/>
      <line x1="6" y1="2" x2="6" y2="4"/>
      <line x1="10" y1="2" x2="10" y2="4"/>
      <line x1="14" y1="2" x2="14" y2="4"/>
    </svg>
    Me paga um café aí, Zé?
  </a>
</body>
</html>
