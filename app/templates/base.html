<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Tarifas ANEEL{% endblock %}</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f1f5f9;
      color: #1a202c;
      font-size: 14px;
    }
    .page {
      max-width: 880px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .topbar h1 {
      margin: 0;
      font-size: 18px;
      color: #1a365d;
    }
    .topbar a {
      color: #3182ce;
      text-decoration: none;
      font-size: 13px;
    }
    .topbar a:hover { text-decoration: underline; }
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <div class="page">
    <div class="topbar">
      <h1>Tarifas ANEEL</h1>
      <a href="/">↻ Nova consulta</a>
    </div>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
