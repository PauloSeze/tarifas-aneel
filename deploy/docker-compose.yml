name: midwest

services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web

  tarifas-aneel:
    image: ghcr.io/pauloseze/tarifas-aneel:latest
    build:
      context: ..
      dockerfile: ../Dockerfile
    container_name: tarifas-aneel
    restart: unless-stopped
    networks:
      - web
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  web:
    name: web
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
